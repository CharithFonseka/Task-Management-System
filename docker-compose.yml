version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: task_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: tms_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - task_network

  backend:
    build:
      context: ../backend
    container_name: task_backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 1234
      DB_NAME: tms_db
    networks:
      - task_network

  frontend-auth:
    build:
      context: ../frontend-auth
    container_name: task_frontend_auth
    restart: always
    ports:
      - "3000:80"
    networks:
      - task_network

  frontend-tasks:
    build:
      context: ../frontend-tasks
    container_name: task_frontend_tasks
    restart: always
    ports:
      - "3001:80"
    networks:
      - task_network

volumes:
  db_data:

networks:
  task_network:
    driver: bridge