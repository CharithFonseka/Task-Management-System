services:
  db:
    image: postgres:15-alpine
    container_name: tms_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: tms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend/server
      dockerfile: Dockerfile
    container_name: tms_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: "1234"
      DB_NAME: tms_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tms_network

  frontend-auth:
    build:
      context: ./frontend/auth
      dockerfile: Dockerfile
    container_name: tms_frontend_auth
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - tms_network

  frontend-tasks:
    build:
      context: ./frontend/tasks
      dockerfile: Dockerfile
    container_name: tms_frontend_tasks
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - tms_network

volumes:
  postgres_data:

networks:
  tms_network:
    driver: bridge